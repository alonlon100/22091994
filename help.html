<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>

<meta charset="UTF-8">

<title>עזרים ומדריכים</title>

<meta name="viewport" content="initial-scale=0.35">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">


<style>

/* ===== אותו MENU כמו ב INDEX ===== */

.menu{
margin:10px;
padding:10px;
background:#dff2ff;
border-radius:12px;

display:flex;
justify-content:center;
gap:2px;
flex-wrap:wrap;
}

.menu button{
background:#00a9ff;
color:white;
border:none;
padding:15px;
cursor:pointer;
font-family:'Varela Round', sans-serif;
font-size:20px;
border-radius:8px;
transition:0.2s;
}

.menu button:hover{
background:#9eddff;
transform:scale(1.05);
}

</style>

</head>


<body>

<div class="main">

<img id="kipo" src="https://i.ibb.co/XwCp4rC/Kipo.png" width="300">

<h1>
עזרים ומדריכים לאתר האישי
</h1>


<div class="menu">

<button onclick="location.href='index.html'">
דף הבית
</button>

<button onclick="location.href='about.html'">
אודות קיפו
</button>

<button onclick="location.href='help.html'">
עזרים ומדריכים לאתר האישי
</button>

</div>



<h2>עזרים ומדריכים</h2>

<div id="content"></div>


</div>



<script type="module">

import {
db,
doc,
getDoc
} from "./firebase.js";


// ===== כפתור עורך למנהל =====

if(localStorage.admin=="yes"){

let b=document.createElement("button");

b.innerText="ערוך עמוד";

b.style.position="fixed";
b.style.bottom="10px";
b.style.left="10px";

b.onclick=()=>location="help_editor.html";

document.body.appendChild(b);

}



// ===== טעינת תוכן מהעורך =====

async function load(){

let snap = await getDoc(
doc(db,"pages","help")
);

if(snap.exists()){

content.innerHTML =
snap.data().html;

}

}

load();

</script>



</body>
</html>
