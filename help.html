<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>

<meta charset="UTF-8">

<title>עזרים ומדריכים</title>

<meta name="viewport" content="initial-scale=0.35">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">


<style>

body{
font-family:Varela Round;
text-align:center;

background:url(https://i.ibb.co/nMmWgCMg/atar.png);
background-repeat:repeat;
animation:bg 20s linear infinite;
}

@keyframes bg{
from{background-position:0 0}
to{background-position:500px 0}
}

.main{
background:white;
width:600px;
margin:auto;
padding:20px;
}

h1{
font-family:Gveret Levin;
color:#00a9ff;
}

#kipo{
animation: shake 3s infinite;
}

#kipo:hover{
animation: shake 0.4s infinite;
}

@keyframes shake{

0%{transform:translate(0,0)}
25%{transform:translate(-2px,2px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-2px,2px)}
100%{transform:translate(0,0)}

}

.menu{
margin:10px;
padding:10px;
background:#dff2ff;
border-radius:12px;

display:flex;
justify-content:center;
gap:2px;
flex-wrap:wrap;
}

.menu button{
background:#00a9ff;
color:white;
border:none;
padding:15px;
cursor:pointer;
font-family:'Varela Round', sans-serif;
font-size:20px;
border-radius:8px;
transition:0.2s;
}

.menu button:hover{
background:#0086cc;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="main">

<img id="kipo" src="https://i.ibb.co/XwCp4rC/Kipo.png" width="300">

<h1>
קיפו - מערכת חינמית לבניית אתרים לילדים
</h1>


<div class="menu">

<button onclick="location.href='index.html'">
דף הבית
</button>

<button onclick="location.href='about.html'">
אודות קיפו
</button>

<button onclick="location.href='help.html'">
עזרים ומדריכים לאתר האישי
</button>

</div>


<h2>עזרים ומדריכים</h2>

<p>
כאן תוסיף מדריכים
</p>


</div>

</body>
</html>
