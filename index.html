<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">

<title>קידבו - מערכת חינמית לבניית אתרים לילדים</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Gveret+Levin&display=swap" rel="stylesheet">

<script type="module" src="firebase.js"></script>

</head>


<body>

<div class="main">

<img src="https://i.ibb.co/pjg57JfN/logo-2.png" width="200">

<h1>קידבו - מערכת חינמית לבניית אתרים לילדים</h1>


<div class="box">

<h3>הרשמה</h3>

<input id="regUser" placeholder="שם משתמש"><br>
<input id="regPass" type="password" placeholder="סיסמה"><br>

<button onclick="register()">הרשמה</button>

</div>


<div class="box">

<h3>התחברות</h3>

<input id="logUser"><br>
<input id="logPass" type="password"><br>

<button onclick="login()">התחברות</button>

</div>


<div class="box">

<h3>אתרים שנבנו</h3>

<div id="sites"></div>

</div>


</div>


<script type="module">

import {
db,
collection,
doc,
setDoc,
getDoc,
getDocs
}
from "./firebase.js";


window.register = async function(){

let u = regUser.value;
let p = regPass.value;

if(!u || !p){
alert("חסר");
return;
}

await setDoc(doc(db,"users",u),{
password:p
});

localStorage.user = u;

location = "editor.html";

};



window.login = async function(){

let u = document.getElementById("logUser").value;
let p = document.getElementById("logPass").value;

const ref = doc(db,"users",u);

const snap = await getDoc(ref);

if(!snap.exists()){
alert("משתמש לא קיים");
return;
}

if(snap.data().password !== p){
alert("סיסמה שגויה");
return;
}

localStorage.setItem("user",u);

location.href = "editor.html";

}



async function loadSites(){

sites.innerHTML = "";

let q = await getDocs(collection(db,"site"));

q.forEach(d => {

let b = document.createElement("button");

b.innerText = "אתר";

b.onclick = () => {

location = "site.html";

};

sites.appendChild(b);

});

}

loadSites();

</script>


</body>
</html>
