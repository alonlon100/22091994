<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>

<meta charset="UTF-8">

<title>site</title>

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">

<style>

body{
margin:0;
}

.main{
background:white;
width:800px;
margin:auto;
min-height:100vh;
padding:20px;
}

.top{
background:#eee;
padding:10px;
}

</style>

</head>

<body>

<div class="top">

<button onclick="home()">
חזרה לדף הבית
</button>

</div>

<div class="main">

<h1 id="title"></h1>

<div id="content"></div>

</div>


<script type="module">

import {
db,
doc,
getDoc
} from "./firebase.js?v=2";


function getUser(){

let p = new URLSearchParams(location.search);

return p.get("u");

}


async function load(){

let u = getUser();

let snap = await getDoc(
doc(db,"sites",u)
);

if(!snap.exists()) return;

let data = snap.data();

title.innerText = data.name;

content.innerHTML = data.html;

content.style.fontFamily = data.font;

content.style.color = data.color;

document.body.style.background =
"url("+data.bg+") repeat";

}


load();


window.home=function(){

location.href="index.html";

};

</script>

</body>
</html>
