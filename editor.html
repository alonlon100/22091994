<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">

<title>עורך</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script type="module" src="firebase.js"></script>

</head>

<body>

<div class="main">

<h2>עורך האתר</h2>

שם האתר

<br>

<input id="siteName">

<br><br>

בחירת רקע:

<br>

<div id="bgSelect"></div>

<br><br>

<div id="editor" style="height:300px"></div>

<br>

<button onclick="save()">שמירה</button>

<button onclick="openSite()">מעבר לאתר</button>

</div>



<script type="module">

import {
db,
doc,
setDoc,
getDoc
} from "./firebase.js";


let user = localStorage.user;

if(!user) location="index.html";


let quill = new Quill('#editor', {
theme: 'snow'
});


let bgs = [

"https://i.ibb.co/4wXF4Jh5/514971w649bnc4h7.gif",
"https://i.ibb.co/xKSFXQ6p/1028701nidgo5cnnh.gif",
"https://i.ibb.co/GQRtGjbP/1301959bqir6wvcvv.gif",
"https://i.ibb.co/VpWKtQ9z/1254492hl9oznlwgq.gif",
"https://i.ibb.co/v4YFzCGH/1253900io7iftppfb.gif"

];

let bg = "";

bgs.forEach(u=>{

let img = document.createElement("img");

img.src = u;

img.width = 80;

img.onclick=()=>{

bg = u;

};

bgSelect.appendChild(img);

});


const ref = doc(db,"site","main");


window.save = async function(){

await setDoc(ref,{

name: siteName.value,
html: quill.root.innerHTML,
bg: bg

});

alert("נשמר");

};


async function load(){

let snap = await getDoc(ref);

if(snap.exists()){

siteName.value = snap.data().name;

quill.root.innerHTML = snap.data().html;

bg = snap.data().bg;

}

}

load();


window.openSite=function(){

location="site.html";

};

</script>

</body>
</html>
